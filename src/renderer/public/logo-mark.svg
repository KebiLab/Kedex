<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F0F12"/>
      <stop offset="1" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.22" r="0.85">
      <stop offset="0" stop-color="white" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Rounded squircle base -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" stroke="url(#stroke)" stroke-width="1.4" stroke-opacity="0.7"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#glow)"/>

  <!-- Decorative dot grid (subtle "code" texture) -->
  <g fill="white" fill-opacity="0.06">
    <circle cx="50" cy="10" r="0.7"/>
    <circle cx="54" cy="14" r="0.7"/>
    <circle cx="46" cy="14" r="0.7"/>
    <circle cx="10" cy="50" r="0.7"/>
    <circle cx="14" cy="54" r="0.7"/>
    <circle cx="14" cy="46" r="0.7"/>
  </g>

  <!-- Stylized k-glyph as flowing ribbons -->
  <g transform="translate(0,0)">
    <!-- Left vertical stem with slight inner curvature -->
    <path d="M18 14
             C 17.2 14 16.6 14.7 16.6 15.5
             L 16.6 48.5
             C 16.6 49.3 17.2 50 18 50
             L 20.4 50
             C 21.2 50 21.8 49.3 21.8 48.5
             L 21.8 15.5
             C 21.8 14.7 21.2 14 20.4 14 Z"
          fill="url(#ribbonA)"/>
    <!-- Upper arm: smooth bezier from mid stem to top-right -->
    <path d="M21 32.4
             C 20.6 32 20.6 31.4 21 31.0
             L 39.0 16.6
             C 39.6 16.1 40.4 16.1 41.0 16.6
             L 42.6 17.9
             C 43.2 18.4 43.2 19.3 42.6 19.8
             L 26.8 32.5 Z"
          fill="url(#ribbonB)"/>
    <!-- Lower leg: smooth bezier from mid stem to bottom-right -->
    <path d="M26.8 32.5
             L 42.6 45.2
             C 43.2 45.7 43.2 46.6 42.6 47.1
             L 41.0 48.4
             C 40.4 48.9 39.6 48.9 39.0 48.4
             L 21 33.0
             C 20.6 32.6 20.6 32.0 21 31.6 Z"
          fill="url(#ribbonB)"/>
    <!-- Joint highlight (where the arms meet) -->
    <circle cx="24" cy="32" r="1.6" fill="white" fill-opacity="0.55"/>
  </g>

  <!-- Subtle outer glow stroke -->
  <rect x="2" y="2" width="60" height="60" rx="16" stroke="url(#stroke)" stroke-width="0.6" stroke-opacity="0.35" filter="url(#soft)"/>
</svg>
