<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131316"/>
      <stop offset="1" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="32" y1="40" x2="120" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="40" y1="80" x2="220" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.22" r="0.85">
      <stop offset="0" stop-color="white" stop-opacity="0.4"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="big" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Soft outer glow halo -->
  <rect x="12" y="12" width="232" height="232" rx="64" fill="url(#stroke)" opacity="0.18" filter="url(#big)"/>

  <!-- Squircle base -->
  <rect x="8" y="8" width="240" height="240" rx="62" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="62" stroke="url(#stroke)" stroke-width="3" stroke-opacity="0.7"/>
  <rect x="8" y="8" width="240" height="240" rx="62" fill="url(#glow)"/>

  <!-- Decorative dot grid (subtle "code" texture) -->
  <g fill="white" fill-opacity="0.07">
    <circle cx="200" cy="40" r="2"/>
    <circle cx="216" cy="56" r="2"/>
    <circle cx="184" cy="56" r="2"/>
    <circle cx="40" cy="200" r="2"/>
    <circle cx="56" cy="216" r="2"/>
    <circle cx="56" cy="184" r="2"/>
    <circle cx="220" cy="220" r="2"/>
  </g>

  <!-- Decorative thin arc lines (orbit/scan motif) -->
  <g stroke="url(#stroke)" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <path d="M 30 130 Q 128 50 226 130"/>
    <path d="M 30 130 Q 128 210 226 130"/>
  </g>

  <!-- k-glyph: flowing ribbons -->
  <g>
    <!-- Stem -->
    <path d="M72 56
             C 69 56 67 58.5 67 61.5
             L 67 194.5
             C 67 197.5 69 200 72 200
             L 82 200
             C 85 200 87 197.5 87 194.5
             L 87 61.5
             C 87 58.5 85 56 82 56 Z"
          fill="url(#ribbonA)"/>
    <!-- Upper arm -->
    <path d="M84 132
             C 82.5 130.5 82.5 128 84 126.5
             L 156 66
             C 159 63.5 163 63.5 166 66
             L 172 71
             C 175 73.5 175 78 172 80.5
             L 107 132 Z"
          fill="url(#ribbonB)"/>
    <!-- Lower leg -->
    <path d="M107 132
             L 172 184.5
             C 175 187 175 191.5 172 194
             L 166 199
             C 163 201.5 159 201.5 156 199
             L 84 138.5
             C 82.5 137 82.5 134.5 84 133 Z"
          fill="url(#ribbonB)"/>
    <!-- Joint highlight -->
    <circle cx="96" cy="132" r="5" fill="white" fill-opacity="0.6"/>
  </g>

  <!-- Subtle outer glow stroke -->
  <rect x="8" y="8" width="240" height="240" rx="62" stroke="url(#stroke)" stroke-width="2" stroke-opacity="0.4" filter="url(#soft)"/>
</svg>
