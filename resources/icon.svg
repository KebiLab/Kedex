<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1A1A"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#525252"/>
      <stop offset="1" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="spark" x1="128" y1="44" x2="128" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FB923C" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Soft warm halo -->
  <circle cx="128" cy="128" r="110" fill="url(#glow)"/>
  <!-- Squircle base -->
  <rect x="20" y="20" width="216" height="216" rx="62" fill="url(#bg)"/>
  <rect x="20" y="20" width="216" height="216" rx="62" stroke="url(#ring)" stroke-width="2.4"/>
  <!-- 4-point spark -->
  <path d="M128 56 L 138 118 L 200 128 L 138 138 L 128 200 L 118 138 L 56 128 L 118 118 Z" fill="url(#spark)"/>
  <!-- inner core -->
  <circle cx="128" cy="128" r="14" fill="#FFFFFF"/>
  <circle cx="128" cy="128" r="6" fill="#F97316"/>
  <!-- accent dots -->
  <circle cx="200" cy="56" r="4" fill="#FB923C" fill-opacity="0.7"/>
  <circle cx="56" cy="200" r="4" fill="#FB923C" fill-opacity="0.7"/>
  <circle cx="210" cy="210" r="2.5" fill="#FB923C" fill-opacity="0.45"/>
  <circle cx="46" cy="46" r="2.5" fill="#FB923C" fill-opacity="0.45"/>
</svg>
